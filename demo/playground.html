<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizat Playground — Canvas studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./playground.css" />
  </head>
  <body>
    <header class="pg-header">
      <div class="pg-brand">
        <strong>Vizat</strong>
        <span class="pg-badge">Playground</span>
      </div>
      <nav class="pg-nav">
        <a href="/">Landing</a>
        <a href="/docs">Docs</a>
      </nav>
    </header>

    <section class="pg-toolbar">
      <p class="pg-hint">Interactive canvas — drag shapes, snap-to-grid, selection overlay.</p>
      <div class="pg-actions">
        <button type="button" id="btn-add-rect" class="pg-btn primary">Add rectangle</button>
        <button type="button" id="btn-redraw" class="pg-btn">Reset demo</button>
        <button type="button" id="btn-clear" class="pg-btn ghost">Clear</button>
      </div>
    </section>

    <main class="pg-stage">
      <div id="vizat-container" class="pg-canvas-wrap" aria-label="Vizat canvas playground"></div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
