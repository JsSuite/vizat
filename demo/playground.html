<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizat Playground</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body { background: #0a0a0a; color: #e8e8e8; font-family: Inter, system-ui, sans-serif; }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 24px; border-bottom: 1px solid #262626;
      }
      header a { color: #b794f6; text-decoration: none; margin-left: 16px; }
      #vizat-container { min-height: 70vh; width: 100%; background: #1a1a2e; }
      .toolbar { padding: 12px 24px; display: flex; gap: 12px; flex-wrap: wrap; }
      button {
        background: #7c3aed; color: #fff; border: none; padding: 8px 16px;
        border-radius: 6px; cursor: pointer; font-weight: 600;
      }
      button:hover { background: #6d28d9; }
    </style>
  </head>
  <body>
    <header>
      <strong>Vizat <span style="color:#b794f6">playground</span></strong>
      <nav>
        <a href="/">Landing</a>
        <a href="/docs">Docs</a>
      </nav>
    </header>
    <div class="toolbar">
      <button type="button" id="btn-redraw">Redraw demo</button>
      <button type="button" id="btn-clear">Clear</button>
    </div>
    <div id="vizat-container"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
